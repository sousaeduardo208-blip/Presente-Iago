<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pra você ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  max-width: 420px;
  width: 100%;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  animation: fadeIn 1s ease;
}

h1 {
  text-align: center;
  color: #e91e63;
}

.mensagem {
  margin-top: 20px;
  padding: 15px;
  border-radius: 15px;
  background: #fff5f7;
  animation: slideUp 0.6s ease;
}

.mensagem img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 10px;
}

.locked {
  text-align: center;
  padding: 20px;
  border-radius: 15px;
  background: #f1f1f1;
  color: #aaa;
  font-size: 14px;
}

iframe {
  margin-top: 20px;
  width: 100%;
  border-radius: 12px;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes slideUp {
  from {
    transform: translateY(20px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}
</style>

</head>
<body>

<div class="container">
  <div class="card">

    <h1 id="contador"></h1>

    <div id="conteudo"></div>

    <h3 style="text-align:center;">Nossa trilha sonora 🎶</h3>

    <iframe 
    src="https://open.spotify.com/embed/playlist/6TPRcA84PeQ0G4A7aceGiD"
    height="152">
    </iframe>

  </div>
</div>

<script>
// DATA FINAL
const dataFinal = new Date("2026-05-08");
const dataInicio = new Date("2026-04-05");
const hoje = new Date();

// CONTADOR
const diasFaltando = Math.ceil((dataFinal - hoje) / (1000 * 60 * 60 * 24));
document.getElementById("contador").innerText = 
  diasFaltando > 0 
  ? `Faltam ${diasFaltando} dias ❤️`
  : "É hoje!!! 🎉❤️";

// MENSAGENS (EDITA AQUI)
const dias = [
  {
    texto: "Dia 1 — Dá play na música… você é meu lugar favorito ❤️",
    foto: "foto1.jpg"
  },
  {
    texto: "Dia 2 — Eu escolheria você todos os dias.",
    foto: "foto2.jpg"
  },
  {
    texto: "Dia 3 — Tem coisas que só a gente entende 😏",
    foto: "foto3.jpg"
  }
];

// DESBLOQUEIO
const diasPassados = Math.floor((hoje - dataInicio) / (1000 * 60 * 60 * 24));

let html = "";

dias.forEach((dia, index) => {
  if(index <= diasPassados){
    html += `
      <div class="mensagem">
        <img src="${dia.foto}">
        <p>${dia.texto}</p>
      </div>
    `;
  } else {
    html += `
      <div class="locked">
        🔒 Liberado em breve...
      </div>
    `;
  }
});

document.getElementById("conteudo").innerHTML = html;

</script>

</body>
</html>
