<script>

// DATA FINAL
const dataFinal = new Date("2026-05-08");
const dataInicio = new Date("2026-04-04");
const hoje = new Date();

// CONTADOR
const diasFaltando = Math.ceil((dataFinal - hoje) / (1000 * 60 * 60 * 24));
document.getElementById("contador").innerText = 
  diasFaltando > 0 
  ? `Faltam ${diasFaltando} dias ❤️`
  : "É hoje!!! 🎉❤️";

// MENSAGENS (EDITA AQUI)
  const dias = [
  {
    texto: "Dia 1 — Dá play na nossa música… e lembra que você é meu lugar favorito ❤️",

  {

  {

  },

    foto: "AAF6B452-7EB3-4C2A-A0AA-473AF12203AE.png"
  },
  {

    foto: "03CF7024-2C5C-41B3-B3E6-A7ED2B7E4B8E.png"
  },
];

// DESBLOQUEIO
const diasPassados = Math.floor((hoje - dataInicio) / (1000 * 60 * 60 * 24));

let html = "";

dias.forEach((dia, index) => {
  if(index <= diasPassados){
    html += `

<div class="mensagem" onclick="abrirCard(this)">
  <div class="card-fechado">
  <div class="envelope">💌</div>
    Dia ${index + 1} — Toque para abrir 🎁
  </div>

  <div class="card-aberto">
    <img src="${dia.foto}">
    <p>${dia.texto}</p>
  </div>
</div>
`;
  } else {
    html += `
      <div class="locked">
        🔒 Liberado em breve...
      </div>
    `;
  }
});

document.getElementById("conteudo").innerHTML = html;

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
});

setTimeout(() => {
  document.querySelectorAll(".mensagem").forEach(el => {
    observer.observe(el);
  });
}, 200);

setTimeout(() => {
  document.querySelectorAll(".mensagem").forEach(el => {
    observer.observe(el);
  });
}, 300);
function entrar() {
  const entrada = document.getElementById("entrada");
  entrada.style.opacity = "0";
  entrada.style.transition = "0.8s";

  const container = document.querySelector(".container");
  container.style.display = "flex";
  container.style.opacity = "1";

  setTimeout(() => {
    entrada.style.display = "none";
  }, 800);
}

function abrirCard(elemento) {
  elemento.classList.toggle("ativa");

  const som = document.getElementById("clickSound");
  som.currentTime = 0;
  som.play();
}

</script>
