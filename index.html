 <!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pra você ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  background:
    radial-gradient(circle at 20% 30%, rgba(255, 100, 150, 0.4), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255, 0, 100, 0.3), transparent 40%),
    linear-gradient(135deg, #1a1a2e, #3a0f2e, #ff4d6d);

  background-size: cover;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  padding: 20px;
}
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.4));
  top: 0;
  left: 0;
  pointer-events: none;
}
h1 {
  text-align: center;
  color: #ff8fab;
  text-shadow: 0 0 10px rgba(255, 100, 150, 0.5);
}
@keyframes fundoAnimado {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  max-width: 420px;
  width: 100%;

  display: flex;
  flex-direction: column;
  gap: 20px;
  
  position: relative;
  opacity: 0;
  z-index: 1;

  min-height: 200vh;
}

.card {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  border-radius: 25px;
  padding: 20px;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
  position: relative;
  overflow: hidden;
}
 .card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 25px;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.1), transparent);
  opacity: 0.4;
  pointer-events: none;
}

h1 {
  text-align: center;
  color: #e91e63;
}

.mensagem {
  margin-top: 20px;
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);

  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s ease;
}

.mensagem.show {
  opacity: 1;
  transform: translateY(0);
}

.mensagem img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  transition: transform 0.3s, box-shadow 0.3s;
  
  opacity: 0;
  transform: scale(0.95);
}

.mensagem:first-child {
  transform: scale(0.95);
  transition: all 0.6s ease;
}

.mensagem.show:first-child {
  transform: scale(1);
}
.mensagem.show img {
  opacity: 1;
  transform: scale(1);
}
.mensagem img:hover {
  transform: scale(1.04);
  box-shadow: 0 15px 35px rgba(0,0,0,0.7);
}

.locked {
  text-align: center;
  padding: 20px;
  border-radius: 15px;
  background: #f1f1f1;
  color: #aaa;
  font-size: 14px;
}

<h2>Nossa trilha sonora 🎶</h2>
<iframe style="border-radius:12px" 
src="https://open.spotify.com/embed/playlist/6TPRcA84PeQ0G4A7aceGiD?utm_source=generator" 
width="100%" 
height="152" 
frameBorder="0" 
allowfullscreen="" 
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
loading="lazy">
</iframe>

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes slideUp {
  from {
    transform: translateY(20px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}
#entrada {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  z-index: 9999;
}

  background: linear-gradient(135deg, #0f0c29, #302b63, #ff4d6d);

  display: flex;
  justify-content: center;
  align-items: center;

  z-index: 9999;
}

.entrada-box {
  text-align: center;
  color: white;
}

.entrada-box h1 {
  font-size: 28px;
  color: #ff4d6d;
  text-shadow: 0 0 10px rgba(255, 77, 109, 0.8);
}

.entrada-box button {
  margin-top: 20px;
  padding: 12px 30px;
  border: none;
  border-radius: 30px;
  background: #ff4d6d;
  color: white;
  font-size: 16px;
  transition: 0.3s;
}

.entrada-box button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px rgba(255, 77, 109, 0.7);
}

#entrada {
  animation: aparecerEntrada 1s ease;
}

@keyframes aparecerEntrada {
  from {
    opacity: 0;
    transform: scale(1.1);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

</style>

</head>
<body>

<div id="entrada">
  <div class="entrada-box">
    <h1>Eu fiz isso pra você ❤️</h1>
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<div class="container">
  <div class="card">

    <h1 id="contador"></h1>

    <div id="conteudo"></div>

    <h3 style="text-align:center;">Nossa trilha sonora 🎶</h3>

    <iframe 
    src="https://open.spotify.com/embed/playlist/6TPRcA84PeQ0G4A7aceGiD"
    height="152">
    </iframe>

  </div>
</div>

<script>
// DATA FINAL
const dataFinal = new Date("2026-05-08");
const dataInicio = new Date("2026-04-05");
const hoje = new Date();

// CONTADOR
const diasFaltando = Math.ceil((dataFinal - hoje) / (1000 * 60 * 60 * 24));
document.getElementById("contador").innerText = 
  diasFaltando > 0 
  ? `Faltam ${diasFaltando} dias ❤️`
  : "É hoje!!! 🎉❤️";

// MENSAGENS (EDITA AQUI)
  const dias = [
  {
    texto: "Dia 1 — Dá play na nossa música… e lembra que você é meu lugar favorito ❤️",
    foto: "18AA3220-6E80-4512-9186-109CEEAEAFD4.jpeg"
  },
  {
    texto: "Dia 2 — Eu amo cada detalhe seu… até aqueles que você acha que ninguém percebe 😌",
    foto: "26fd5bba-357d-4859-8869-b7091e07e916.jpeg"
  },
  {
    texto: "Dia 3 — Se eu pudesse escolher qualquer lugar agora… ainda seria ao seu lado",
    foto: "5590B9C6-8FA6-43EE-A089-A669F6C76CCC.jpeg"
  },
  {
    texto: "Dia 4 — Tem coisas em você que me deixam completamente sem controle… 😏",
    foto: "IMG_3440.jpeg"
  },
  {
    texto: "Dia 5 — Eu adoro quando você chega perto… mas confesso que prefiro quando não vai embora",
    foto: "bf0be967-d05b-4d51-beba-03c1612521fa.jpeg"
  },
  {
    texto: "Dia 6 — Você não faz ideia do efeito que tem sobre mim… ou talvez faça 😈",
    foto: "foto6.jpg"
  },
  {
    texto: "Dia 7 — Isso aqui é só o começo… você ainda não viu nada ❤️🔥",
    foto: "foto7.jpg"
  }
];

// DESBLOQUEIO
const diasPassados = Math.floor((hoje - dataInicio) / (1000 * 60 * 60 * 24));

let html = "";

dias.forEach((dia, index) => {
  if(index <= diasPassados){
    html += `
      <div class="mensagem">
        <img src="${dia.foto}">
        <p>${dia.texto}</p>
      </div>
    `;
  } else {
    html += `
      <div class="locked">
        🔒 Liberado em breve...
      </div>
    `;
  }
});

document.getElementById("conteudo").innerHTML = html;

const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry, index) => {
    if (entry.isIntersecting) {
      setTimeout(() => {
        entry.target.classList.add("show");
      }, index * 200);
      observer.unobserve(entry.target); // 👈 evita repetir
    }
  });
}, {
  threshold: 0.3
});

setTimeout(() => {
  document.querySelectorAll(".mensagem").forEach(el => {
    observer.observe(el);
  });
}, 300);
function entrar() {
  const entrada = document.getElementById("entrada");
  entrada.style.opacity = "0";
  entrada.style.transition = "0.8s";
  document.querySelector(".container").style.opacity = "1";

  setTimeout(() => {
    entrada.style.display = "none";
  }, 800);
}

</script>

</body>
</html>
